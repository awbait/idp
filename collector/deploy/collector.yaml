# idp-collector: cluster-wide read-only scanner that writes a workload snapshot
# into Valkey/Redis for the IDP console. Single replica (the snapshot is a full
# rewrite each cycle; running two replicas just duplicates work).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: idp-collector
  namespace: idp
---
# Variant A: cluster-wide read-only authorization. RBAC is not label-aware, so
# the label filtering happens in the collector via NS_LABEL_SELECTOR, not here.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: idp-collector-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: idp-collector-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: idp-collector-reader
subjects:
  - kind: ServiceAccount
    name: idp-collector
    namespace: idp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-collector
  namespace: idp
  labels:
    app.kubernetes.io/name: idp-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: idp-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idp-collector
    spec:
      serviceAccountName: idp-collector
      containers:
        - name: collector
          image: idp-collector:latest # build and push from collector/
          env:
            - name: REDIS_URL
              value: "redis://valkey:6379/0"
            - name: NS_LABEL_SELECTOR
              value: "idp.scan=true"
            - name: POLL_INTERVAL
              value: "30s"
            - name: CLUSTER_NAME
              value: "default"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532 # distroless "nonroot" uid; kubelet needs it numeric
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
