# Lefthook git hooks for the IDP repo.
# Install once after clone:  lefthook install   (or `make hooks`)
# Docs: https://lefthook.dev
#
# The gate runs on pre-push so commits stay fast; push is blocked if any
# command fails. Each command is scoped by `glob`/`root`, so a push that
# touches only the frontend skips the Go checks and vice versa.
pre-push:
  parallel: true
  commands:
    backend-lint:
      glob: "*.go"
      run: golangci-lint run --allow-parallel-runners ./...
    backend-test:
      glob: "*.go"
      run: go test ./...
    collector-lint:
      root: "collector/"
      glob: "*.go"
      run: golangci-lint run --allow-parallel-runners ./...
    collector-test:
      root: "collector/"
      glob: "*.go"
      run: go test ./...
    web-typecheck:
      root: "web/"
      glob: "*.{ts,tsx}"
      run: bun run typecheck
    web-test:
      root: "web/"
      glob: "*.{ts,tsx}"
      run: bun test
    web-lint:
      root: "web/"
      glob: "*.{ts,tsx,css,json}"
      run: bunx biome lint ./src --diagnostic-level=error
    # Atlas migration gate: verifies atlas.sum integrity and that the directory
    # replays cleanly on a throwaway dev database. Only runs when migration
    # files change. Needs the Atlas CLI (https://atlasgo.io) and Docker.
    # (`atlas migrate lint` is Atlas Pro since v0.38; `validate` stays OSS.)
    migrate-validate:
      glob: "internal/store/migrations/*.sql"
      run: atlas migrate validate --env local
