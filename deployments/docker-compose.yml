# Local stack: Postgres + Valkey + portal (fakes-only upstreams).
# The fakes simulate Harbor/GitLab/ArgoCD so the full order happy-path runs
# without any of those systems present.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Valkey: drop-in RESP-compatible Redis fork (BSD-licensed). The portal speaks
  # the same redis:// protocol via go-redis, so CACHE=redis / REDIS_URL stay.
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Minimal Keycloak for testing the OIDC flow. dev-mode, imports the "internal"
  # realm (client "portal", groups team-*/platform-admins/support/security,
  # users alice/padmin/support/security).
  # Exposed on :8081 so browser and a host-run portal share the same issuer
  # (http://localhost:8081/realms/internal). See README "OIDC" for how to run.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
    volumes:
      - ./keycloak/realm-internal.json:/opt/keycloak/data/import/realm-internal.json:ro
    ports:
      - "8081:8080"

  portal:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      HTTP_PORT: "8080"
      # storage backends
      STORE: postgres
      CACHE: redis
      DATABASE_URL: postgres://portal:portal@postgres:5432/portal?sslmode=disable
      REDIS_URL: redis://valkey:6379/0
      # upstreams: explicit fakes for this zero-infra dev stack (built-in default
      # is now "real"; the upstreams overlay sets real + URLs/tokens).
      HARBOR_MODE: fake
      GITLAB_MODE: fake
      ARGOCD_MODE: fake
      # auth: dev mode (no Keycloak); user via X-Dev-* headers
      AUTH_MODE: dev
      STATUS_POLL_INTERVAL: 5s
      LOG_FORMAT: text
    ports:
      - "8080:8080"

  # Frontend SPA served by nginx; proxies /api -> portal and injects dev-auth.
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    depends_on:
      - portal
    ports:
      - "8088:80"

  # --- Observability (optional): `make obs` starts just these two. ---
  # Prometheus scrapes the portal's /metrics (host-run via `make run`, or the
  # `portal` service in the full stack). host-gateway lets the container reach a
  # host-run portal at host.docker.internal on Linux too.
  prometheus:
    image: prom/prometheus:v2.54.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  # Grafana with the Prometheus datasource and IDP dashboard auto-provisioned.
  # Anonymous viewer access is on for the dev stack (no login prompt).
  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
