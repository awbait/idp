# Prometheus scrape config for the IDP portal.
# The portal exposes /metrics (promhttp) on a dedicated METRICS_PORT (default
# 2112), separate from the API port. It runs from source on the host
# (`make run-oidc`), reached from this container at host.docker.internal.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: idp-portal
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:2112

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
